name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore MusicMatch.sln

      - name: Build
        run: dotnet build MusicMatch.sln --no-restore

      - name: Run Unit Tests
        run: dotnet test MusicMatch.sln --no-build --verbosity normal --filter "FullyQualifiedName~Tests.Unit"

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: musicmatch
          POSTGRES_PASSWORD: musicmatch
          POSTGRES_DB: musicmatch_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore MusicMatch.sln

      - name: Build
        run: dotnet build MusicMatch.sln --no-restore

      - name: Run Integration Tests
        run: dotnet test MusicMatch.sln --no-build --verbosity normal --filter "FullyQualifiedName~Tests.Integration"
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=musicmatch_test;Username=musicmatch;Password=musicmatch"
